<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luvics Pratinho</title>

  <link rel="icon" href="https://raw.githubusercontent.com/LuanFaria/luvics/f8f98f609442dd4d1157d33f74956095637a16b9/pratinho/imagens/fivicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: #333;

      /* 🔥 FUNDO AGORA VAI APARECER */
      background: url('https://raw.githubusercontent.com/LuanFaria/luvics/9daf37c2d72a42da23690c964027f0b364af28bf/pratinho/imagens/Fundo%201.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    /* 🔥 TOPO COMO FAIXA */
    .topo {
      position: relative;
      height: 180px; /* controla altura da faixa */
      overflow: hidden;
    }

    .topo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* BOTÃO NO MEIO DA FAIXA */
    .btn-topo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      
      background: linear-gradient(45deg, #ff7a00, #ffb347);
      color: white;
      padding: 14px 26px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;

      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .btn-topo:hover {
      transform: translate(-50%, -50%) scale(1.05);
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #ff7a00;
      margin-top: 20px;
    }

    .sub {
      text-align: center;
      margin-top: 10px;
      opacity: 0.8;
    }

    .center {
      text-align: center;
    }

    .ebook img {
      max-width: 300px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.95);
      padding: 25px;
      border-radius: 16px;
      margin-top: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    ul {
      padding-left: 20px;
      line-height: 1.8;
    }

    .price {
      font-size: 38px;
      color: #ff7a00;
      font-weight: bold;
    }

    .old-price {
      text-decoration: line-through;
      color: #888;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(45deg, #ff7a00, #ffb347);
      color: white;
      padding: 14px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 20px;
    }

    .sticky-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff7a00;
      color: white;
      padding: 14px 24px;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      z-index: 999;
    }

  </style>
</head>

<body>

<!-- 🔥 TOPO FAIXA -->
<div class="topo">
  <img src="https://raw.githubusercontent.com/LuanFaria/luvics/f24b9d86f535483cab877530ebc645dad3a13844/pratinho/imagens/capa%20topo.png">
  <a href="#comprar" class="btn-topo">VER RECEITAS</a>
</div>

<div class="container">

  <h1>Seu bebê não quer comer? 😥</h1>
  <p class="sub">Receitas simples que fazem seu bebê comer melhor</p>

  <div class="center ebook">
    <img src="https://raw.githubusercontent.com/LuanFaria/luvics/09e23495ff4ddb6e314b5376667f56f524917a9c/pratinho/imagens/ebook3d.png">
  </div>

  <div class="card">
    <h2>Você passa por isso?</h2>
    <ul>
      <li>😣 Seu bebê recusa comida</li>
      <li>😣 Falta ideia do que preparar</li>
      <li>😣 Medo de errar</li>
      <li>😣 Rotina corrida</li>
    </ul>
  </div>

  <div class="card center">
    <p class="old-price">De R$29,90</p>
    <p class="price">R$14,90</p>

    <a id="comprar" href="#" class="btn">QUERO MEU GUIA</a>

    <p style="margin-top:10px;">✅ Garantia de 7 dias</p>
  </div>

</div>

<a href="#comprar" class="sticky-btn">Comprar</a>

</body>
</html>
