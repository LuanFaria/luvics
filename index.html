<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

:root {
    --neon-green: #00ff9f;
    --neon-pink: #ff00cc;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
                url('https://raw.githubusercontent.com/LuanFaria/luvic.nutrition/refs/heads/main/FUNDO.png') center/cover no-repeat fixed;
    color: #fff;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 20px;
    text-align: center;
}

/* TOPO */
.top-cta {
    display: flex;
    gap: 25px;
    margin-bottom: 40px;
}

@media(max-width: 768px){
    .top-cta {
        flex-direction: column;
    }
}

.top-cta a { flex: 1; }

.top-cta img {
    width: 100%;
    border-radius: 20px;
    transition: all 0.35s ease;
    box-shadow: 0 0 40px rgba(0,255,159,0.25);
}

/* 🔥 EFEITO VOLTOU */
.top-cta a:hover img {
    transform: scale(1.05);
    box-shadow:
        0 0 60px var(--neon-green),
        0 0 120px var(--neon-pink);
}

/* HEADLINE */
h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    font-weight: 900;
    background: linear-gradient(90deg, var(--neon-green), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.sub {
    font-size: 1.1rem;
    color: #ccc;
    margin-bottom: 50px;
}

/* LAYOUT */
.main-content {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
}

/* ORDEM */
.side-img { order: 1; }
.buttons { order: 2; }
.right-img { order: 3; }

@media(max-width: 900px){
    .main-content {
        flex-direction: column;
        gap: 30px;
    }

    .buttons { order: 1; }
    .side-img { order: 2; }
    .right-img { order: 3; }
}

/* IMAGENS */
.side-img img,
.right-img img {
    max-width: 240px;
    border-radius: 18px;
    box-shadow: 0 0 40px rgba(255,0,204,0.3);
}

/* BOTÕES */
.buttons {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 450px;
    width: 100%;
}

.btn {
    width: 100%;
    padding: 24px;
    font-size: 1.3rem;
    font-weight: 900;
    border-radius: 50px;
    text-decoration: none;
    color: #fff;
}

/* WHATS */
.btn-whatsapp {
    background: #25D366;
    border: 3px solid var(--neon-green);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 20px #25D366; }
    50% { box-shadow: 0 0 45px #00ff9f; }
    100% { box-shadow: 0 0 20px #25D366; }
}

/* EBOOK */
.btn-comprar {
    border: 3px solid var(--neon-pink);
    box-shadow: 0 0 25px var(--neon-pink);
}

.btn-comprar:hover {
    background: var(--neon-pink);
    color: #000;
}

/* LOJA */
.btn-loja {
    border: 2px solid #aaa;
    opacity: 0.9;
}

.btn-loja:hover {
    border-color: #fff;
    box-shadow: 0 0 25px #fff;
}

/* RODAPÉ */
footer {
    margin-top: 80px;
    font-size: 0.9rem;
    color: #777;
}
