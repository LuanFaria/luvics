    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        :root {
            --receitas-laranja: #FFB38A;
            --receitas-verde: #A8E6CF;
            --sono-azul-claro: #89CFF0;
            --sono-azul-escuro: #0047AB;
            --desmame-roxo: #8A2BE2;
            --ml-amarelo: #FFF159;
            --ml-azul: #2D3277;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
                        url('https://raw.githubusercontent.com/LuanFaria/luvic.nutrition/refs/heads/main/FUNDO.png') center/cover no-repeat fixed;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        /* LOGO / PERFIL */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #fff;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .sub {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 40px;
        }

        /* LAYOUT PRINCIPAL */
        .main-content {
            display: flex;
            align-items: flex-start;
            justify-content: center;
            gap: 20px;
            position: relative;
        }

        /* BOTÕES */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
            max-width: 400px;
            z-index: 2;
        }

        .btn {
            width: 100%;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 15px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
            text-transform: uppercase;
            border: 2px solid transparent;
        }

        .btn:hover {
            transform: scale(1.03);
        }

        /* ESTILOS ESPECÍFICOS DOS BOTÕES */
        
        /* 1. Ebook Receitas */
        .btn-receitas {
            background-color: var(--receitas-laranja);
            color: #333;
            border-color: var(--receitas-verde);
            box-shadow: 0 0 15px rgba(255, 179, 138, 0.4);
        }
        .btn-receitas:hover {
            box-shadow: 0 0 30px var(--receitas-laranja), 0 0 10px var(--receitas-verde);
        }

        /* 2. Roteiro do Sono */
        .btn-sono {
            background: linear-gradient(135deg, var(--sono-azul-claro), var(--sono-azul-escuro));
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 71, 171, 0.4);
        }
        .btn-sono:hover {
            box-shadow: 0 0 30px var(--sono-azul-claro);
        }

        /* 3. Curso Desmame */
        .btn-desmame {
            background-color: var(--desmame-roxo);
            color: #fff;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }
        .btn-desmame:hover {
            box-shadow: 0 0 30px var(--desmame-roxo);
        }

        /* 4. Mercado Livre */
        .btn-ml {
            background-color: var(--ml-amarelo);
            color: var(--ml-azul);
            border-color: var(--ml-azul);
            box-shadow: 0 0 15px rgba(255, 241, 89, 0.3);
        }
        .btn-ml:hover {
            box-shadow: 0 0 30px var(--ml-amarelo);
        }

        /* ESPAÇOS PARA IMAGENS LATERAIS (DESKTOP) */
        .side-img-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-img-container img {
            width: 100%;
            max-width: 150px;
            border-radius: 12px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .side-img-container img:hover { opacity: 1; }

        /* RESPONSIVIDADE MOBILE */
        @media(max-width: 768px){
            .main-content {
                flex-direction: column;
                align-items: center;
            }

            .side-img-container {
                display: flex;
                flex-direction: row; /* Imagens ficam lado a lado abaixo dos botões no mobile */
                flex-wrap: wrap;
                justify-content: center;
                margin-top: 20px;
            }

            .side-img-container img {
                max-width: 120px;
            }

            h1 { font-size: 1.5rem; }
        }

        footer {
            margin-top: 60px;
            padding-bottom: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="https://raw.githubusercontent.com/LuanFaria/luvic.nutrition/refs/heads/main/logo.png" alt="Logo Luvic" class="profile-img">
    
    <h1>Luvic Nutrition</h1>
    <div class="sub">
        Transforme sua rotina e a saúde da sua família

            <img src="URL_DA_SUA_IMAGEM_2" alt="">
        </div>

        <div class="buttons">

            <a href="https://luvics.com.br/pratinho" target="_blank" class="btn btn-receitas">
                🍎 +101 Receitinhas Saudáveis
            </a>

            <a href="#" target="_blank" class="btn btn-sono">
                🌙 Roteiro do Sono Infantil
            </a>

            <a href="https://luvics.com.br/desmame-na-pratica" target="_blank" class="btn btn-desmame">
                🍼 Curso Desmame na Prática
            </a>
            
            <a href="#" target="_blank" class="btn btn-ml">
                🛍️ Minha Lojinha Mercado Livre
            </a>

        </div>

        <div class="side-img-container">
            <img src="https://raw.githubusercontent.com/LuanFaria/luvics/d1b23589d74b197377058f1fe73828ade7146de5/pratinho/imagens/imagem%20inteira" alt="">
            <img src="URL_DA_SUA_IMAGEM_4" alt="">
        </div>

    </div>

    <footer>
        © 2026 Luvic Nutrition • Todos os direitos reservados
    </footer>

</div>

</body>
</html>
