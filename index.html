    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

        :root {
            --receitas-laranja: #FFB38A;
            --receitas-verde: #A8E6CF;
            --sono-azul-claro: #89CFF0;
            --sono-azul-escuro: #0047AB;
            --desmame-roxo: #8A2BE2;
            --ml-amarelo: #FFF159;
            --ml-azul: #2D3277;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            /* Fundo Atualizado com o link RAW */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85)),
                        url('https://raw.githubusercontent.com/LuanFaria/luvics/b0908677efe967e8e83db61bcf11055e5ab5d238/pratinho/imagens/Fundo%201.png') center/cover no-repeat fixed;
            color: #fff;
            min-height: 100vh;
        }

        .container {
            max-width: 600px; /* Mais estreito para focar no mobile */
            margin: 0 auto;
            padding: 30px 20px;
            text-align: center;
        }

        /* IMAGEM DE DESTAQUE (ANTIGO PERFIL) - Aumentada */
        .profile-img {
            width: 100%;
            max-width: 320px; /* Tamanho bem maior */
            height: auto;
            border-radius: 20px; /* Bordas arredondadas ao invés de círculo */
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .sub {
            font-size: 1rem;
            color: #ddd;
            margin-bottom: 30px;
        }

        /* ==== CARROSSEL DE PRODUTOS (NOVIDADE) ==== */
        .carousel-container {
            margin-bottom: 30px;
        }
        
        .carousel-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .carousel {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory; /* Faz a rolagem "travar" na imagem */
            gap: 15px;
            padding-bottom: 15px;
            /* Esconde a barra de rolagem mas mantém a função */
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        
        .carousel::-webkit-scrollbar { 
            display: none; 
        }

        .carousel a {
            flex: 0 0 75%; /* Cada imagem ocupa 75% da tela, mostrando um pedaço da próxima */
            scroll-snap-align: center;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: transform 0.3s ease;
        }

        .carousel a:active {
            transform: scale(0.95);
        }

        .carousel img {
            width: 100%;
            height: 200px; /* Altura padrão para os banners do carrossel */
            object-fit: cover; /* Garante que a imagem não distorça */
            display: block;
        }

        /* Efeito de brilho em cima do carrossel */
        .carousel a::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            pointer-events: none;
        }

        .carousel-legenda {
            position: absolute;
            bottom: 10px;
            left: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: left;
            z-index: 2;
        }

        /* ==== BOTÕES ==== */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 15px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: block;
            text-transform: uppercase;
            border: 2px solid transparent;
        }

        .btn:active { transform: scale(0.97); }

        /* Estilos dos Botões */
        .btn-receitas {
            background-color: var(--receitas-laranja);
            color: #333;
            border-color: var(--receitas-verde);
            box-shadow: 0 0 15px rgba(255, 179, 138, 0.2);
        }
        .btn-sono {
            background: linear-gradient(135deg, var(--sono-azul-claro), var(--sono-azul-escuro));
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 71, 171, 0.3);
        }
        .btn-desmame {
            background-color: var(--desmame-roxo);
            color: #fff;
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.3);
        }
        .btn-ml {
            background-color: var(--ml-amarelo);
            color: var(--ml-azul);
            border-color: var(--ml-azul);
            box-shadow: 0 0 15px rgba(255, 241, 89, 0.2);
        }

        footer {
            margin-top: 50px;
            padding-bottom: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
